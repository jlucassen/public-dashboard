name: Update Dashboard

on:
  schedule:
    # 8:00 AM UTC = midnight Pacific (PST is UTC-8)
    # Adjust to 7:00 AM UTC during PDT (UTC-7) if needed
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install requests python-dotenv pyyaml google-api-python-client google-auth

      - name: Run pipeline
        env:
          TOGGL_TOKEN: ${{ secrets.TOGGL_TOKEN }}
          TODOIST_TOKEN: ${{ secrets.TODOIST_TOKEN }}
          DAILY_FORM_SHEET_ID: ${{ secrets.DAILY_FORM_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          source .venv/bin/activate
          python -m pipeline.main

      - name: Commit and push metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/metrics.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update dashboard metrics $(date -u +%Y-%m-%d)"
          git push
